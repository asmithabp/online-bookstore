version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: bookstore-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: online-bookstore
    networks:
      - bookstore-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookstore-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/online-bookstore
      JWT_SECRET: super_secret_jwt_key_change_in_production_please
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - bookstore-net

  # ── Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: bookstore-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - bookstore-net

volumes:
  mongo_data:
  backend_uploads:

networks:
  bookstore-net:
    driver: bridge
